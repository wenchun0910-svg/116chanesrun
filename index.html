<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>長安小鐵人計時表</title>
  
  <!-- Google Fonts: Noto Serif TC (For Japanese/Traditional aesthetic) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Tailwind Configuration for Custom Japanese Colors -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Noto Serif TC"', 'serif'],
          },
          colors: {
            aizome: '#1A365D', /* 深靛藍 (藍染) */
            asagi: '#0089A7', /* 藍綠色 (淺蔥) */
            kurenai: '#CB1B45', /* 緋紅色 (紅) */
            kinari: '#FDFBF7', /* 和紙米白 (生成) */
            haifuji: '#E8ECEF', /* 灰藍底色 */
            shironeri: '#FCFAF2' /* 極淡的絲綢白 */
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #FDFBF7; 
    }
    ::-webkit-scrollbar-thumb {
      background: #0089A7; 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #1A365D; 
    }
    
    .seat-btn {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .seat-btn:active:not(:disabled) {
      transform: scale(0.92);
    }
    .seat-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 15px -3px rgba(26, 54, 93, 0.3);
    }
  </style>
</head>
<body class="min-h-screen bg-kinari font-serif text-aizome p-4 md:p-8 relative selection:bg-aizome selection:text-white">

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-aizome text-white px-8 py-4 rounded-sm shadow-2xl border-2 border-asagi flex items-center gap-3 transition-opacity duration-300 opacity-0 pointer-events-none hidden">
    <i data-lucide="check-circle" class="text-asagi w-6 h-6"></i>
    <span id="toast-message" class="font-bold tracking-wide"></span>
  </div>

  <!-- Main Container -->
  <div class="max-w-7xl mx-auto bg-white rounded-lg shadow-[0_15px_40px_-15px_rgba(0,0,0,0.15)] border-2 border-haifuji relative overflow-hidden">
    
    <!-- Header -->
    <div class="bg-aizome text-kinari py-8 text-center relative border-b-8 border-asagi">
      <h1 class="text-4xl md:text-6xl font-black tracking-[0.2em] drop-shadow-lg">
        長安小鐵人計時表
      </h1>
      <!-- Traditional subtle wave line effect -->
      <div class="absolute left-0 bottom-0 w-full h-2 bg-gradient-to-r from-transparent via-asagi to-transparent opacity-60"></div>
    </div>

    <div class="p-6 md:p-10 flex flex-col gap-10">
      
      <!-- Top Section: Settings & Timer Side by Side -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- Settings (Top Left) -->
        <div class="bg-shironeri p-8 rounded-lg border-2 border-haifuji shadow-sm flex flex-col justify-center">
          <label class="block text-2xl font-bold mb-6 text-aizome border-b-2 border-haifuji pb-2 inline-block w-max">
            設定班級人數
          </label>
          <input
            type="number"
            id="student-count-input"
            min="1"
            max="100"
            class="w-full text-4xl p-4 border-b-4 border-aizome rounded-none focus:outline-none focus:border-asagi bg-transparent disabled:opacity-50 transition-colors text-center font-bold"
          />
        </div>

        <!-- Timer Display (Top Right) -->
        <div class="bg-white border-4 border-aizome p-8 flex flex-col items-center justify-center rounded-lg shadow-md relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-3 bg-aizome"></div>
          
          <div class="text-7xl md:text-8xl font-sans font-black text-aizome tracking-widest my-4 drop-shadow-sm flex items-center gap-4">
            <i data-lucide="timer" class="text-asagi w-14 h-14"></i>
            <span id="timer-display">00:00</span>
          </div>

          <div class="flex flex-col w-full gap-4 mt-6 z-10">
            <button
              id="toggle-timer-btn"
              class="w-full py-5 rounded-sm text-3xl font-bold border-2 transition-all shadow-md bg-aizome text-white border-aizome hover:bg-[#11243f] tracking-widest"
            >
              計時開始
            </button>
            
            <!-- Action Buttons: Save & Query -->
            <div class="flex flex-col sm:flex-row gap-4 w-full">
              <button
                id="save-db-btn"
                class="flex-1 py-4 rounded-sm text-xl font-bold bg-white text-aizome border-2 border-aizome hover:bg-haifuji shadow-sm flex items-center justify-center gap-2 hidden transition-colors"
              >
                <i data-lucide="save" class="w-6 h-6"></i> 儲存成績
              </button>
              <button
                id="query-history-btn"
                class="flex-1 py-4 rounded-sm text-xl font-bold bg-asagi text-white border-2 border-asagi hover:bg-[#00708a] shadow-sm flex items-center justify-center gap-2 transition-colors"
              >
                <i data-lucide="database" class="w-6 h-6"></i> 查詢歷史
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Seat Buttons (Below Top Section) -->
      <div class="bg-shironeri p-8 rounded-lg border-2 border-haifuji shadow-inner">
        <div class="flex items-center gap-3 mb-8 border-b-2 border-haifuji pb-3">
          <i data-lucide="users" class="w-8 h-8 text-aizome"></i>
          <h2 class="text-3xl font-bold text-aizome tracking-wider">點擊座號記錄成績</h2>
        </div>
        
        <!-- 大按鈕容器 -->
        <div id="seat-container" class="flex flex-wrap gap-5 md:gap-6 justify-center p-4">
          <!-- Seat buttons injected via JS -->
        </div>
      </div>

      <!-- Bottom Section: Results Table -->
      <div class="bg-white border-2 border-haifuji rounded-lg shadow-sm overflow-hidden w-full flex flex-col">
        <div class="bg-aizome text-kinari py-4 px-6 font-bold text-2xl border-b-4 border-asagi flex justify-between items-center flex-wrap gap-4 tracking-wider">
          <span id="table-title">英雄榜（本次成績紀錄）</span>
        </div>
        
        <div class="overflow-x-auto p-4">
          <table class="w-full text-center border-collapse" id="records-table">
            <thead>
              <tr class="bg-kinari text-aizome border-b-4 border-aizome" id="table-header-row">
                <th class="p-4 border-2 border-haifuji w-1/2 text-2xl tracking-widest">座號</th>
                <th class="p-4 border-2 border-haifuji text-asagi w-1/2 text-2xl tracking-widest">本次紀錄</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <!-- Rows injected via JS -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- History Modal (New Window) -->
  <div id="history-modal" class="hidden fixed inset-0 bg-aizome/80 z-50 flex items-center justify-center p-4 md:p-8 backdrop-blur-sm transition-opacity">
    <div class="bg-kinari rounded-lg border-4 border-asagi w-full max-w-7xl max-h-full flex flex-col shadow-2xl relative overflow-hidden">
      <!-- Modal Header -->
      <div class="flex justify-between items-center p-6 border-b-4 border-asagi bg-white">
        <h3 class="text-3xl font-black text-aizome tracking-widest flex items-center gap-3">
          <i data-lucide="database" class="w-8 h-8 text-asagi"></i> 歷史成績查詢 (總管模式)
        </h3>
        <div class="flex items-center gap-4">
           <button id="change-pwd-btn" class="text-sm bg-transparent text-aizome px-4 py-2 border-2 border-aizome hover:bg-aizome hover:text-white transition-colors font-bold rounded-sm shadow-sm">修改密碼</button>
           <button id="close-modal-btn" class="text-haifuji hover:text-kurenai bg-aizome hover:bg-white rounded-full transition-colors p-1"><i data-lucide="x-circle" class="w-10 h-10"></i></button>
        </div>
      </div>
      <!-- Modal Body (Table) -->
      <div class="p-6 overflow-auto flex-1 bg-shironeri">
         <table class="w-full text-center border-collapse" id="history-table">
            <thead>
              <tr class="bg-kinari text-aizome border-b-4 border-aizome" id="history-header-row">
                <!-- Injected via JS -->
              </tr>
            </thead>
            <tbody id="history-body">
              <!-- Injected via JS -->
            </tbody>
         </table>
      </div>
    </div>
  </div>

  <!-- Bottom Floating Controls -->
  <div class="fixed bottom-8 right-8 flex flex-col gap-4 z-40">
    <button
      id="reset-btn"
      class="w-20 h-20 bg-asagi text-white rounded-full flex flex-col items-center justify-center shadow-[0_8px_20px_rgba(0,137,167,0.4)] hover:bg-[#00708a] hover:scale-110 transition-transform border-4 border-white group"
      title="重置畫面"
    >
      <i data-lucide="rotate-ccw" class="w-8 h-8 group-hover:-rotate-90 transition-transform duration-300"></i>
      <span class="text-sm font-bold mt-1 tracking-widest">重置</span>
    </button>
  </div>

  <!-- Application Logic -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc, updateDoc, deleteDoc, getDocs } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // --- System Variables ---
    const firebaseConfig = {
  apiKey: "AIzaSyAVFqmk4PcClpfo2TguUX6Cum3ppQ5Qxc0",
  authDomain: "chanesrun.firebaseapp.com",
  projectId: "chanesrun",
  storageBucket: "chanesrun.firebasestorage.app",
  messagingSenderId: "966853241204",
  appId: "1:966853241204:web:353dda4090ec1da9dae421"
};

    const hasFirebase = Object.keys(firebaseConfig).length > 0;
    
    let app, auth, db;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'changan-ironman-default';

    if (hasFirebase) {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    }

    // --- State Management ---
    let state = {
      user: null,
      studentCount: parseInt(localStorage.getItem('studentCount') || '25'),
      time: 0,
      isRunning: false,
      sessionRecords: {}, 
      dbRecords: [], 
      isAdmin: false,
      adminPassword: localStorage.getItem('adminPwd') || 'admin888',
      timerInterval: null
    };

    // --- DOM Elements ---
    const UI = {
      studentCountInput: document.getElementById('student-count-input'),
      timerDisplay: document.getElementById('timer-display'),
      toggleTimerBtn: document.getElementById('toggle-timer-btn'),
      saveDbBtn: document.getElementById('save-db-btn'),
      queryHistoryBtn: document.getElementById('query-history-btn'),
      seatContainer: document.getElementById('seat-container'),
      tableTitle: document.getElementById('table-title'),
      tableHeaderRow: document.getElementById('table-header-row'),
      tableBody: document.getElementById('table-body'),
      historyModal: document.getElementById('history-modal'),
      historyHeaderRow: document.getElementById('history-header-row'),
      historyBody: document.getElementById('history-body'),
      closeModalBtn: document.getElementById('close-modal-btn'),
      changePwdBtn: document.getElementById('change-pwd-btn'),
      resetBtn: document.getElementById('reset-btn'),
      toast: document.getElementById('toast'),
      toastMessage: document.getElementById('toast-message')
    };

    // --- Utility Functions ---
    const formatTime = (totalSeconds) => {
      const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
      const seconds = (totalSeconds % 60).toString().padStart(2, '0');
      return `${minutes}:${seconds}`;
    };

    const showToast = (msg) => {
      UI.toastMessage.innerText = msg;
      UI.toast.classList.remove('hidden');
      void UI.toast.offsetWidth;
      UI.toast.classList.remove('opacity-0');
      setTimeout(() => {
        UI.toast.classList.add('opacity-0');
        setTimeout(() => UI.toast.classList.add('hidden'), 300);
      }, 3000);
    };

    // --- Auth & DB Initialization ---
    const initAuth = async () => {
      if (!hasFirebase) {
        setupDbListener();
        return;
      }
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("Authentication failed:", error);
      }
    };

    if (hasFirebase) {
      onAuthStateChanged(auth, (currentUser) => {
        state.user = currentUser;
        if (currentUser) setupDbListener();
      });
    }

    const setupDbListener = () => {
      if (hasFirebase && state.user) {
        const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'runnerRecords');
        onSnapshot(recordsRef, (snapshot) => {
          state.dbRecords = snapshot.docs.map(doc => ({
            id: doc.id, ...doc.data()
          })).sort((a, b) => a.seatNumber - b.seatNumber);
          if (state.isAdmin) renderHistoryTable();
        }, (error) => console.error("Error fetching records:", error));
      } else if (!hasFirebase) {
        const localData = localStorage.getItem('ironman_records');
        if (localData) state.dbRecords = JSON.parse(localData);
        if (state.isAdmin) renderHistoryTable();
      }
    };

    // --- UI Render Functions ---
    const renderSeats = () => {
      UI.seatContainer.innerHTML = '';
      for (let i = 1; i <= state.studentCount; i++) {
        const isRecorded = !!state.sessionRecords[i];
        const btn = document.createElement('button');
        btn.innerText = i;
        // 日式大按鈕設計
        btn.className = `w-20 h-20 sm:w-24 sm:h-24 rounded-full flex items-center justify-center text-3xl sm:text-4xl font-black shadow-md seat-btn border-4 
          ${isRecorded 
            ? 'bg-gray-200 text-gray-400 border-gray-300 cursor-not-allowed scale-95 opacity-80' 
            : 'bg-white text-aizome border-aizome cursor-pointer hover:bg-aizome hover:text-white'
          }
          ${!state.isRunning && !isRecorded ? 'opacity-60 grayscale-[50%]' : 'opacity-100'}
        `;
        btn.disabled = isRecorded || !state.isRunning;
        btn.onclick = () => handleRecordTime(i);
        UI.seatContainer.appendChild(btn);
      }
    };

    const renderTable = () => {
      // Main table now ONLY renders current session records
      UI.tableBody.innerHTML = '';
      let hasAnyData = false;

      for (let seat = 1; seat <= state.studentCount; seat++) {
        const hasSessionRecord = !!state.sessionRecords[seat];
        if (!hasSessionRecord) continue;

        hasAnyData = true;
        const tr = document.createElement('tr');
        tr.className = "border-b-2 border-haifuji hover:bg-shironeri transition-colors";
        
        tr.innerHTML = `
          <td class="p-5 font-black text-3xl border-2 border-haifuji bg-kinari text-aizome">${seat}</td>
          <td class="p-5 border-2 border-haifuji font-sans font-bold text-asagi text-2xl tracking-wider">${state.sessionRecords[seat]}</td>
        `;
        UI.tableBody.appendChild(tr);
      }

      if (!hasAnyData) {
        UI.tableBody.innerHTML = `<tr><td colspan="2" class="p-12 text-gray-400 italic text-2xl tracking-widest">尚無本次紀錄，請計時後點擊座號儲存。</td></tr>`;
      }
    };

    const renderHistoryTable = () => {
      const allDates = new Set();
      state.dbRecords.forEach(r => {
        if (r.history) r.history.forEach(h => allDates.add(h.date));
      });
      const sortedDates = Array.from(allDates).sort();

      // Render Modal Headers (With Column Delete Buttons)
      let headerHTML = `<th class="p-4 border-2 border-haifuji w-24 text-2xl tracking-widest bg-kinari whitespace-nowrap">座號</th>`;
      
      sortedDates.forEach(date => {
        headerHTML += `
          <th class="p-4 border-2 border-haifuji min-w-[150px] bg-kinari">
            <div class="flex flex-col items-center gap-2">
              <span class="text-xl font-bold text-aizome tracking-wider">${date}</span>
              <button data-date="${date}" class="delete-col-btn text-sm bg-kurenai text-white px-3 py-1 rounded-sm hover:bg-[#A31637] flex items-center gap-1 shadow-sm transition-colors mt-2 font-bold">
                <i data-lucide="trash-2" class="w-4 h-4"></i> 刪除此欄
              </button>
            </div>
          </th>
        `;
      });
      UI.historyHeaderRow.innerHTML = headerHTML;
      
      // Render Modal Body
      UI.historyBody.innerHTML = '';
      let hasAnyData = false;

      for (let seat = 1; seat <= state.studentCount; seat++) {
        const dbRecord = state.dbRecords.find(r => r.seatNumber === seat);
        const hasDbRecord = dbRecord && dbRecord.history && dbRecord.history.length > 0;

        if (!hasDbRecord) continue;
        hasAnyData = true;

        const tr = document.createElement('tr');
        tr.className = "border-b-2 border-haifuji hover:bg-white transition-colors";
        
        let rowHTML = `<td class="p-4 font-black text-2xl border-2 border-haifuji bg-shironeri text-aizome">${seat}</td>`;

        sortedDates.forEach(date => {
          const h = dbRecord ? (dbRecord.history || []).find(x => x.date === date) : null;
          rowHTML += `<td class="p-4 border-2 border-haifuji font-sans text-aizome text-2xl tracking-wider font-bold">${h ? h.time : '-'}</td>`;
        });

        tr.innerHTML = rowHTML;
        UI.historyBody.appendChild(tr);
      }

      if (!hasAnyData) {
        UI.historyBody.innerHTML = `<tr><td colspan="${sortedDates.length + 1}" class="p-12 text-gray-400 italic text-2xl tracking-widest">目前尚無任何歷史紀錄。</td></tr>`;
      }

      // Attach column delete events
      document.querySelectorAll('.delete-col-btn').forEach(btn => {
        btn.onclick = () => handleDeleteColumn(btn.getAttribute('data-date'));
      });

      if (typeof lucide !== 'undefined') lucide.createIcons();
    };

    const updateVisibility = () => {
      // Timer Button State (Red for STOP, Navy for START)
      if (state.isRunning) {
        UI.toggleTimerBtn.innerText = '計時結束';
        UI.toggleTimerBtn.className = "w-full py-5 rounded-sm text-3xl font-bold border-2 transition-all shadow-md bg-kurenai text-white border-kurenai hover:bg-[#A31637] tracking-widest";
      } else {
        UI.toggleTimerBtn.innerText = '計時開始';
        UI.toggleTimerBtn.className = "w-full py-5 rounded-sm text-3xl font-bold border-2 transition-all shadow-md bg-aizome text-white border-aizome hover:bg-[#11243f] tracking-widest";
      }

      const hasRecords = Object.keys(state.sessionRecords).length > 0;
      UI.studentCountInput.disabled = state.isRunning || hasRecords;

      if (!state.isRunning && hasRecords) {
        UI.saveDbBtn.classList.remove('hidden');
      } else {
        UI.saveDbBtn.classList.add('hidden');
      }

      if (state.isRunning) {
        UI.queryHistoryBtn.classList.add('hidden');
      } else {
        UI.queryHistoryBtn.classList.remove('hidden');
      }
    };

    // --- Action Handlers ---
    const handleToggleTimer = () => {
      if (state.isRunning) {
        state.isRunning = false;
        clearInterval(state.timerInterval);
      } else {
        state.isRunning = true;
        if (state.time === 0) state.sessionRecords = {};
        state.timerInterval = setInterval(() => {
          state.time += 1;
          UI.timerDisplay.innerText = formatTime(state.time);
        }, 1000);
      }
      renderSeats();
      renderTable();
      updateVisibility();
    };

    const handleRecordTime = (seatNumber) => {
      if (!state.isRunning) {
        showToast("請先點擊「計時開始」！");
        return;
      }
      if (state.sessionRecords[seatNumber]) return;

      state.sessionRecords[seatNumber] = formatTime(state.time);
      renderSeats();
      renderTable();
      updateVisibility();
    };

    const handleSaveToDB = async () => {
      const recordsToSave = Object.entries(state.sessionRecords);
      if (recordsToSave.length === 0) return;

      UI.saveDbBtn.innerHTML = `<i data-lucide="loader" class="w-6 h-6 animate-spin"></i> 儲存中...`;
      if (typeof lucide !== 'undefined') lucide.createIcons();
      UI.saveDbBtn.disabled = true;

      const now = new Date();
      const saveTime = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

      try {
        if (hasFirebase && state.user) {
          for (const [seatStr, timeStr] of recordsToSave) {
            const seat = parseInt(seatStr);
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'runnerRecords', `seat_${seat}`);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
              const data = docSnap.data();
              const history = data.history || [];
              await updateDoc(docRef, { history: [...history, { date: saveTime, time: timeStr }] });
            } else {
              await setDoc(docRef, { seatNumber: seat, history: [{ date: saveTime, time: timeStr }] });
            }
          }
        } else {
          for (const [seatStr, timeStr] of recordsToSave) {
            const seat = parseInt(seatStr);
            let existingRecord = state.dbRecords.find(r => r.seatNumber === seat);
            
            if (existingRecord) {
              if (!existingRecord.history) existingRecord.history = [];
              existingRecord.history.push({ date: saveTime, time: timeStr });
            } else {
              state.dbRecords.push({ id: `seat_${seat}`, seatNumber: seat, history: [{ date: saveTime, time: timeStr }] });
            }
          }
          state.dbRecords.sort((a, b) => a.seatNumber - b.seatNumber);
          localStorage.setItem('ironman_records', JSON.stringify(state.dbRecords));
        }

        state.sessionRecords = {};
        state.time = 0;
        UI.timerDisplay.innerText = "00:00";
        showToast("成績已成功儲存！");
        renderSeats();
        renderTable();
        if(state.isAdmin) renderHistoryTable();
      } catch (error) {
        console.error("Error saving:", error);
        showToast("儲存失敗，請重試。");
      } finally {
        UI.saveDbBtn.innerHTML = `<i data-lucide="save" class="w-6 h-6"></i> 儲存成績`;
        if (typeof lucide !== 'undefined') lucide.createIcons();
        UI.saveDbBtn.disabled = false;
        updateVisibility();
      }
    };

    const handleQueryHistory = () => {
      const pwd = prompt("請輸入總管密碼以開啟歷史查詢視窗：");
      if (pwd === state.adminPassword) {
        state.isAdmin = true;
        renderHistoryTable();
        UI.historyModal.classList.remove('hidden');
        showToast("已進入歷史查詢模式。");
      } else if (pwd !== null) {
        showToast("密碼錯誤！");
      }
    };

    const handleDeleteColumn = async (targetDate) => {
      if (!state.isAdmin) return;
      if(!confirm(`確定要刪除「${targetDate}」的所有成績紀錄嗎？\n⚠️ 此動作會將全班該次成績移除，且無法復原！`)) return;

      try {
        if (hasFirebase && state.user) {
          for (const record of state.dbRecords) {
            const updatedHistory = (record.history || []).filter(h => h.date !== targetDate);
            if (updatedHistory.length !== (record.history || []).length) {
              const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'runnerRecords', record.id);
              await updateDoc(docRef, { history: updatedHistory });
            }
          }
        } else {
          state.dbRecords = state.dbRecords.map(record => ({
             ...record,
             history: (record.history || []).filter(h => h.date !== targetDate)
          }));
          localStorage.setItem('ironman_records', JSON.stringify(state.dbRecords));
        }
        showToast(`已刪除 ${targetDate} 的成績紀錄！`);
        if(!hasFirebase) renderHistoryTable();
      } catch (error) {
        console.error("Error deleting column:", error);
        showToast("刪除失敗。");
      }
    };

    const handleReset = () => {
      state.isRunning = false;
      clearInterval(state.timerInterval);
      state.time = 0;
      state.sessionRecords = {};
      UI.timerDisplay.innerText = "00:00";
      renderSeats();
      renderTable();
      updateVisibility();
      showToast("畫面資料已重置。");
    };

    // --- Event Listeners Binding ---
    UI.studentCountInput.value = state.studentCount;
    UI.studentCountInput.addEventListener('change', (e) => {
      const val = Math.max(1, parseInt(e.target.value) || 25);
      state.studentCount = val;
      localStorage.setItem('studentCount', val.toString());
      renderSeats();
      renderTable();
    });

    UI.toggleTimerBtn.addEventListener('click', handleToggleTimer);
    UI.saveDbBtn.addEventListener('click', handleSaveToDB);
    UI.queryHistoryBtn.addEventListener('click', handleQueryHistory);
    UI.resetBtn.addEventListener('click', handleReset);
    
    // Modal Close
    UI.closeModalBtn.addEventListener('click', () => {
      UI.historyModal.classList.add('hidden');
      state.isAdmin = false; 
      showToast("已關閉歷史查詢。");
    });

    UI.changePwdBtn.addEventListener('click', () => {
      const newPwd = prompt('請輸入新的總管密碼：');
      if (newPwd && newPwd.trim() !== '') {
        state.adminPassword = newPwd.trim();
        localStorage.setItem('adminPwd', state.adminPassword);
        showToast('密碼已成功修改！');
      }
    });

    // --- Initialization ---
    if (typeof lucide !== 'undefined') lucide.createIcons();
    initAuth();
    renderSeats();
    renderTable();
    updateVisibility();

  </script>
</body>
</html>
